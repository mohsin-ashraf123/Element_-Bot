app = "element-bot-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  APP_PORT = "8000"
  TIMEZONE = "Asia/Karachi"
  MATRIX_E2EE_STORE_PATH = "/app/data/matrix_store"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "120s"
    method = "GET"
    path = "/api/health"

# Fly.io free allowance: shared-cpu-1x @ 256MB (upgrade if OOM)
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "element_bot_data"
  destination = "/app/data"
